[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**"]

[functions.api]
  timeout = 26

# API routes → Netlify Function (must be before SPA fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# React Router — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
