# Optional: Render Blueprint for the API server
# Deploy at https://dashboard.render.com/ → New → Blueprint
services:
  - type: web
    name: dhanz-wealth-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SANITY_PROJECT_ID
        value: "6992crjl"
      - key: SANITY_DATASET
        value: production
      - key: SANITY_WRITE_TOKEN
        sync: false
      - key: CMS_PASSWORD
        sync: false
